apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaosmesh-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chaosmesh-project
  template:
    metadata:
      labels:
        app: chaosmesh-project
    spec:
      containers:
      - name: chaosmesh-project
        image: chaosmesh-project:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chaosmesh-project
spec:
  selector:
    app: chaosmesh-project
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
