apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaosmesh-microservice
spec:
  replicas: 5
  selector:
    matchLabels:
      app: chaosmesh-microservice
  template:
    metadata:
      labels:
        app: chaosmesh-microservice
    spec:
      containers:
      - name: chaosmesh-microservice
        image: chaosmesh-microservice
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chaosmesh-microservice
spec:
  selector:
    app: chaosmesh-microservice
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30000
  type: NodePort
